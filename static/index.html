<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beautify</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #86868b;
      font-size: 1.05rem;
      margin-top: 8px;
      margin-bottom: 32px;
    }

    .input-group {
      display: flex;
      gap: 12px;
    }

    input[type="url"] {
      flex: 1;
      padding: 14px 18px;
      font-size: 1rem;
      border: 2px solid #e5e5ea;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="url"]:focus {
      border-color: #6366f1;
    }

    button {
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .status {
      margin-top: 24px;
      text-align: center;
    }

    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #6366f1;
      font-weight: 500;
    }

    .loading.visible { display: flex; }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid #e5e5ea;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      display: none;
      background: #fef2f2;
      color: #dc2626;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 0.95rem;
    }

    .error.visible { display: block; }

    .result {
      display: none;
      margin-top: 24px;
      text-align: center;
    }

    .result.visible { display: block; }

    .result a {
      display: inline-block;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 12px;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .result a:hover { opacity: 0.9; }

    .preview-frame {
      display: none;
      margin-top: 24px;
      border: 2px solid #e5e5ea;
      border-radius: 16px;
      overflow: hidden;
      height: 500px;
    }

    .preview-frame.visible { display: block; }

    .preview-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 520px) {
      .card { padding: 32px 24px; }
      .input-group { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Beautify</h1>
      <p class="subtitle">Paste a URL. Get a beautiful redesign.</p>

      <form id="beautifyForm">
        <div class="input-group">
          <input type="url" id="urlInput" placeholder="https://example.com" required>
          <button type="submit" id="submitBtn">Beautify</button>
        </div>
      </form>

      <div class="status">
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <span>Redesigning&hellip; this may take 20&ndash;30 seconds</span>
        </div>
        <div class="error" id="error"></div>
      </div>

      <div class="result" id="result">
        <a id="resultLink" href="#" target="_blank">View Redesigned Page</a>
      </div>
    </div>

    <div class="preview-frame" id="previewFrame">
      <iframe id="previewIframe"></iframe>
    </div>
  </div>

  <script>
    const form = document.getElementById('beautifyForm');
    const urlInput = document.getElementById('urlInput');
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const result = document.getElementById('result');
    const resultLink = document.getElementById('resultLink');
    const previewFrame = document.getElementById('previewFrame');
    const previewIframe = document.getElementById('previewIframe');

    function showLoading() {
      loading.classList.add('visible');
      error.classList.remove('visible');
      result.classList.remove('visible');
      previewFrame.classList.remove('visible');
      submitBtn.disabled = true;
    }

    function showError(msg) {
      loading.classList.remove('visible');
      error.textContent = msg;
      error.classList.add('visible');
      submitBtn.disabled = false;
    }

    function showResult(previewUrl) {
      loading.classList.remove('visible');
      resultLink.href = previewUrl;
      result.classList.add('visible');
      previewIframe.src = previewUrl;
      previewFrame.classList.add('visible');
      submitBtn.disabled = false;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const url = urlInput.value.trim();
      if (!url) return;

      showLoading();

      try {
        const res = await fetch('/api/beautify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || 'Something went wrong.');
          return;
        }

        showResult(data.preview_url);
      } catch (err) {
        showError('Network error. Is the server running?');
      }
    });
  </script>
</body>
</html>
