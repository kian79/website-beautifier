<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beautify</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 780px;
      margin-top: 40px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #86868b;
      font-size: 1.05rem;
      margin-top: 8px;
      margin-bottom: 32px;
    }

    .input-group {
      display: flex;
      gap: 12px;
    }

    input[type="url"] {
      flex: 1;
      padding: 14px 18px;
      font-size: 1rem;
      border: 2px solid #e5e5ea;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="url"]:focus {
      border-color: #6366f1;
    }

    button {
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .options {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #86868b;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
      display: block;
    }

    .palette-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .palette-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 2px solid #e5e5ea;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-size: 0.85rem;
      font-weight: 500;
      color: #1d1d1f;
      user-select: none;
    }

    .palette-option:hover {
      border-color: #c7c7cc;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .palette-option.selected {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }

    .swatches {
      display: flex;
      gap: 3px;
    }

    .swatch {
      width: 16px;
      height: 16px;
      border-radius: 4px;
    }

    textarea {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      font-family: inherit;
      border: 2px solid #e5e5ea;
      border-radius: 12px;
      outline: none;
      resize: vertical;
      min-height: 80px;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #6366f1; }

    .status {
      margin-top: 24px;
      text-align: center;
    }

    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #6366f1;
      font-weight: 500;
    }

    .loading.visible { display: flex; }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid #e5e5ea;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      display: none;
      background: #fef2f2;
      color: #dc2626;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 0.95rem;
    }

    .error.visible { display: block; }

    .result {
      display: none;
      margin-top: 24px;
    }

    .result.visible { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    .result a, .result button.secondary {
      display: inline-block;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      transition: opacity 0.2s;
      border: none;
      cursor: pointer;
    }

    .result a {
      background: linear-gradient(135deg, #10b981, #059669);
    }

    .result a:hover, .result button.secondary:hover { opacity: 0.9; }

    .result button.secondary {
      background: linear-gradient(135deg, #6366f1, #a855f7);
    }

    .preview-frame {
      display: none;
      margin-top: 24px;
      border: 2px solid #e5e5ea;
      border-radius: 16px;
      overflow: hidden;
      height: 600px;
      position: relative;
    }

    .preview-frame.visible { display: block; }

    .preview-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .preview-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: #f9fafb;
      border-bottom: 1px solid #e5e5ea;
      font-size: 0.85rem;
      color: #6b7280;
    }

    .preview-toolbar .device-btns {
      display: flex;
      gap: 6px;
    }

    .preview-toolbar .device-btns button {
      padding: 6px 12px;
      font-size: 0.8rem;
      border-radius: 8px;
      background: #e5e7eb;
      color: #374151;
      font-weight: 500;
    }

    .preview-toolbar .device-btns button.active {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: #fff;
    }

    .history-section {
      display: none;
      margin-top: 32px;
    }

    .history-section.visible { display: block; }

    .history-section h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: #374151;
    }

    .history-list {
      list-style: none;
      padding: 0;
    }

    .history-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #fff;
      border-radius: 12px;
      margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .history-list li .hist-title {
      font-weight: 500;
      color: #1d1d1f;
    }

    .history-list li .hist-url {
      font-size: 0.85rem;
      color: #86868b;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 300px;
    }

    .history-list li a {
      color: #6366f1;
      font-weight: 500;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .history-list li a:hover { text-decoration: underline; }

    @media (max-width: 520px) {
      .card { padding: 32px 24px; }
      .input-group { flex-direction: column; }
      button { width: 100%; }
      .result { flex-direction: column; align-items: stretch; }
      .history-list li { flex-direction: column; align-items: flex-start; gap: 4px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Beautify</h1>
      <p class="subtitle">Paste a URL. Get a beautiful redesign powered by AI + Tailwind CSS.</p>

      <form id="beautifyForm">
        <div class="input-group">
          <input type="url" id="urlInput" placeholder="https://example.com" required>
          <button type="submit" id="submitBtn">Beautify</button>
        </div>

        <div class="options">
          <div>
            <label>Color Palette</label>
            <div class="palette-grid" id="paletteGrid">
              <div class="palette-option selected" data-value="">
                <div class="swatches">
                  <div class="swatch" style="background: linear-gradient(135deg, #6366f1, #a855f7);"></div>
                  <div class="swatch" style="background: linear-gradient(135deg, #f59e0b, #10b981);"></div>
                  <div class="swatch" style="background: linear-gradient(135deg, #ec4899, #8b5cf6);"></div>
                </div>
                <span>Auto</span>
              </div>
              <div class="palette-option" data-value="Ocean Blue">
                <div class="swatches">
                  <div class="swatch" style="background: #1e3a5f;"></div>
                  <div class="swatch" style="background: #3b82f6;"></div>
                  <div class="swatch" style="background: #bfdbfe;"></div>
                </div>
                <span>Ocean Blue</span>
              </div>
              <div class="palette-option" data-value="Forest Green">
                <div class="swatches">
                  <div class="swatch" style="background: #14532d;"></div>
                  <div class="swatch" style="background: #22c55e;"></div>
                  <div class="swatch" style="background: #f5f5dc;"></div>
                </div>
                <span>Forest Green</span>
              </div>
              <div class="palette-option" data-value="Sunset Warm">
                <div class="swatches">
                  <div class="swatch" style="background: #ea580c;"></div>
                  <div class="swatch" style="background: #f97316;"></div>
                  <div class="swatch" style="background: #fde68a;"></div>
                </div>
                <span>Sunset Warm</span>
              </div>
              <div class="palette-option" data-value="Purple Haze">
                <div class="swatches">
                  <div class="swatch" style="background: #7c3aed;"></div>
                  <div class="swatch" style="background: #c084fc;"></div>
                  <div class="swatch" style="background: #fce7f3;"></div>
                </div>
                <span>Purple Haze</span>
              </div>
              <div class="palette-option" data-value="Monochrome">
                <div class="swatches">
                  <div class="swatch" style="background: #171717;"></div>
                  <div class="swatch" style="background: #737373;"></div>
                  <div class="swatch" style="background: #e5e5e5;"></div>
                </div>
                <span>Monochrome</span>
              </div>
              <div class="palette-option" data-value="Corporate Blue">
                <div class="swatches">
                  <div class="swatch" style="background: #1e40af;"></div>
                  <div class="swatch" style="background: #64748b;"></div>
                  <div class="swatch" style="background: #f8fafc;"></div>
                </div>
                <span>Corporate Blue</span>
              </div>
            </div>
          </div>
          <div>
            <label for="instructionsInput">Custom Instructions</label>
            <textarea id="instructionsInput" placeholder="e.g., Make it minimal, use large hero image, dark mode..."></textarea>
          </div>
        </div>
      </form>

      <div class="status">
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <span id="loadingText">Redesigning&hellip; this may take 20&ndash;40 seconds</span>
        </div>
        <div class="error" id="error"></div>
      </div>

      <div class="result" id="result">
        <a id="resultLink" href="#" target="_blank">Open Full Page</a>
        <button class="secondary" id="togglePreview">Toggle Preview</button>
      </div>
    </div>

    <div class="preview-frame" id="previewFrame">
      <div class="preview-toolbar">
        <span id="previewLabel">Preview</span>
        <div class="device-btns">
          <button class="active" data-width="100%">Desktop</button>
          <button data-width="768px">Tablet</button>
          <button data-width="375px">Mobile</button>
        </div>
      </div>
      <iframe id="previewIframe"></iframe>
    </div>

    <div class="history-section" id="historySection">
      <h2>Recent Beautifications</h2>
      <ul class="history-list" id="historyList"></ul>
    </div>
  </div>

  <script>
    const form = document.getElementById('beautifyForm');
    const urlInput = document.getElementById('urlInput');
    const paletteGrid = document.getElementById('paletteGrid');
    const instructionsInput = document.getElementById('instructionsInput');
    const submitBtn = document.getElementById('submitBtn');
    let selectedPalette = '';

    paletteGrid.addEventListener('click', (e) => {
      const option = e.target.closest('.palette-option');
      if (!option) return;
      paletteGrid.querySelectorAll('.palette-option').forEach(el => el.classList.remove('selected'));
      option.classList.add('selected');
      selectedPalette = option.dataset.value;
    });
    const loading = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const error = document.getElementById('error');
    const result = document.getElementById('result');
    const resultLink = document.getElementById('resultLink');
    const togglePreview = document.getElementById('togglePreview');
    const previewFrame = document.getElementById('previewFrame');
    const previewIframe = document.getElementById('previewIframe');
    const previewLabel = document.getElementById('previewLabel');
    const historySection = document.getElementById('historySection');
    const historyList = document.getElementById('historyList');

    function showLoading() {
      loading.classList.add('visible');
      error.classList.remove('visible');
      result.classList.remove('visible');
      previewFrame.classList.remove('visible');
      submitBtn.disabled = true;
      loadingText.textContent = 'Redesigning\u2026 this may take 20\u201340 seconds';
    }

    function showError(msg) {
      loading.classList.remove('visible');
      error.textContent = msg;
      error.classList.add('visible');
      submitBtn.disabled = false;
    }

    function showResult(previewUrl) {
      loading.classList.remove('visible');
      resultLink.href = previewUrl;
      result.classList.add('visible');
      previewIframe.src = previewUrl;
      previewFrame.classList.add('visible');
      submitBtn.disabled = false;
      loadHistory();
    }

    // Device preview switching
    document.querySelectorAll('.device-btns button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.device-btns button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        previewIframe.style.maxWidth = btn.dataset.width;
        previewIframe.style.margin = btn.dataset.width === '100%' ? '0' : '0 auto';
        previewIframe.style.display = 'block';
      });
    });

    togglePreview.addEventListener('click', () => {
      previewFrame.classList.toggle('visible');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const url = urlInput.value.trim();
      if (!url) return;

      showLoading();

      try {
        const res = await fetch('/api/beautify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url,
            color_palette: selectedPalette || null,
            instructions: instructionsInput.value.trim() || null,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || 'Something went wrong.');
          return;
        }

        showResult(data.preview_url);
      } catch (err) {
        showError('Network error. Is the server running?');
      }
    });

    async function loadHistory() {
      try {
        const res = await fetch('/api/history');
        const items = await res.json();
        if (items.length === 0) {
          historySection.classList.remove('visible');
          return;
        }
        historyList.innerHTML = items.map(item => `
          <li>
            <div>
              <div class="hist-title">${escapeHtml(item.title)}</div>
              <div class="hist-url">${escapeHtml(item.original_url)}</div>
            </div>
            <a href="${item.preview_url}" target="_blank">View</a>
          </li>
        `).join('');
        historySection.classList.add('visible');
      } catch (e) {}
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadHistory();
  </script>
</body>
</html>
